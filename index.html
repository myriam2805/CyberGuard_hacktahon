<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard - Password Strength Analyzer</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #38bdf8;
            text-align: center;
        }
        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus {
            border-color: #38bdf8;
        }
        .progress-bar-container {
            background-color: #475569;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #ef4444;
            transition: width 0.3s, background-color 0.3s;
        }
        .result-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            min-height: 22px;
        }
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .checklist li {
            font-size: 13px;
            margin-bottom: 8px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }
        .checklist li.valid {
            color: #4ade80;
        }
        .checklist li::before {
            content: "X";
            margin-right: 10px;
            font-weight: bold;
            color: #ef4444;
        }
        .checklist li.valid::before {
            content: "[V]";
            color: #4ade80;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CyberGuard</h1>
    <p class="subtitle">Real-time password robustness analysis</p>
    
    <div class="input-group">
        <label for="password">Enter password:</label>
        <input type="text" id="password" placeholder="Awaiting input..." autocomplete="off">
    </div>

    <div class="progress-bar-container">
        <div id="progress" class="progress-bar"></div>
    </div>

    <div id="result" class="result-text">Please type characters to start the test.</div>

    <ul class="checklist">
        <li id="length">Minimum length: 8 characters</li>
        <li id="uppercase">Includes an uppercase letter</li>
        <li id="number">Includes a digit</li>
        <li id="special">Includes a special character (@, #, $, %, etc.)</li>
    </ul>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const progressBar = document.getElementById('progress');
    const resultText = document.getElementById('result');
    
    const reqLength = document.getElementById('length');
    const reqUppercase = document.getElementById('uppercase');
    const reqNumber = document.getElementById('number');
    const reqSpecial = document.getElementById('special');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let score = 0;

        if (val.length >= 8) {
            reqLength.classList.add('valid');
            score++;
        } else {
            reqLength.classList.remove('valid');
        }

        if (/[A-Z]/.test(val)) {
            reqUppercase.classList.add('valid');
            score++;
        } else {
            reqUppercase.classList.remove('valid');
        }

        if (/[0-9]/.test(val)) {
            reqNumber.classList.add('valid');
            score++;
        } else {
            reqNumber.classList.remove('valid');
        }

        if (/[^A-Za-z0-9]/.test(val)) {
            reqSpecial.classList.add('valid');
            score++;
        } else {
            reqSpecial.classList.remove('valid');
        }

        if (val.length === 0) {
            progressBar.style.width = '0%';
            resultText.innerText = 'Please type characters to start the test.';
            resultText.style.color = '#f8fafc';
        } else if (score <= 1) {
            progressBar.style.width = '25%';
            progressBar.style.backgroundColor = '#ef4444';
            resultText.innerText = 'Status: Critical. Instant brute-force vulnerability (less than a second).';
            resultText.style.color = '#ef4444';
        } else if (score === 2) {
            progressBar.style.width = '50%';
            progressBar.style.backgroundColor = '#f97316';
            resultText.innerText = 'Status: Weak. Estimated decoding time: 2 hours.';
            resultText.style.color = '#f97316';
        } else if (score === 3) {
            progressBar.style.width = '75%';
            progressBar.style.backgroundColor = '#eab308';
            resultText.innerText = 'Status: Moderate. Estimated computation time: 3 years.';
            resultText.style.color = '#eab308';
        } else if (score === 4) {
            progressBar.style.width = '100%';
            progressBar.style.backgroundColor = '#4ade80';
            resultText.style.color = '#4ade80';
            
            if(val.length >= 14) {
                resultText.innerText = 'Status: Optimal. Absolute resistance to standard dictionary attacks.';
            } else {
                resultText.innerText = 'Status: Compliant. Estimated computation time: 400 years.';
            }
        }
    });
</script>

</body>
</html>
